services:
  media:
    image: ghcr.io/eventonight/eventonight/media:latest
    networks:
      - eventonight-network
      - media-network
    environment:
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=eventonightadmin
      - MINIO_SECRET_KEY=${MINIO_PASSWORD:?}
      - MINIO_BUCKET=eventonight-media
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${MEDIA_SERVICE_PORT}/health"]
      interval: 2s
      timeout: 3s
      retries: 100
      start_period: 500s

  minio:
    image: minio/minio
    command: server /data
    networks:
      - media-network
    environment:
      - MINIO_ROOT_USER=eventonightadmin
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD:?}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  minio-data:

networks:
  eventonight-network:
  media-network:
