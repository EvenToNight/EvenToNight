services:
  notifications:
    deploy:
      replicas: ${NOTIFICATIONS_SERVICE_REPLICAS:-1}
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.notifications.rule=Host(`notifications.${HOST}`)"
        - "traefik.http.routers.notifications.entrypoints=web"
        - "traefik.http.services.notifications.loadbalancer.server.port=${NOTIFICATIONS_SERVICE_PORT}"
        - "traefik.http.services.notifications.loadbalancer.sticky.cookie=true"
        - "traefik.http.services.notifications.loadbalancer.sticky.cookie.name=notifications_sticky"
        - "traefik.http.services.notifications.loadbalancer.sticky.cookie.httpOnly=true"
        - "traefik.docker.network=${COMPOSE_PROJECT_NAME}_eventonight-network"
    depends_on: []

  mongo-notifications:
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.mongo.notifications.1 == true
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5

  redis-notifications:
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

networks:
  eventonight-network:
    driver: overlay
    attachable: true
  notifications-network:
    driver: overlay
