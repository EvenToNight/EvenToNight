services:
  ticketing:
    image: ghcr.io/eventonight/eventonight/ticketing:latest
    networks:
      - eventonight-network
      - ticketing-network
    environment:
      - HOST=${HOST}
      - PORT=${TICKETING_SERVICE_PORT}
      - TEST_DEPLOYMENT=${TEST_DEPLOYMENT:-false}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASS=${RABBITMQ_PASS}
      - MONGO_HOST=mongo-ticketing
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:?}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:?}
      - REPLICA_SET_NAME=rs0
      - REPLICA_SET_NODES_NUMBER=3
      - AUTH_PUBLIC_KEY_URL=http://users:${USERS_SERVICE_PORT}/public-keys
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${TICKETING_SERVICE_PORT}/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  mongo-ticketing:
    image: mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    networks:
      - ticketing-network
    environment:
      - REPLICA_SET_NODES_NUMBER=3
      - MONGO_HOST=mongo-ticketing
    volumes:
      - mongo-ticketing-data:/data/db
      - ./scripts/init-mongo-replica-set.sh:/scripts/init-mongo-replica-set.sh:ro
    healthcheck:
      test: /scripts/init-mongo-replica-set.sh
      interval: 5s
      timeout: 30s
      start_period: 30s
      retries: 30
    depends_on:
      mongo-ticketing-2:
        condition: service_healthy
      mongo-ticketing-3:
        condition: service_healthy

  mongo-ticketing-2:
    image: mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    networks:
      - ticketing-network
    volumes:
      - mongo-ticketing-2-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.runCommand({ ping: 1 }).ok']
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 30s

  mongo-ticketing-3:
    image: mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    networks:
      - ticketing-network
    volumes:
      - mongo-ticketing-3-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.runCommand({ ping: 1 }).ok']
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 30s

networks:
  eventonight-network:
  ticketing-network:

volumes:
  mongo-ticketing-data:
  mongo-ticketing-2-data:
  mongo-ticketing-3-data:
