services:
  interactions:
    image: ghcr.io/eventonight/eventonight/interactions:latest
    networks:
      - eventonight-network
      - interactions-network
    environment:
      - PORT=${INTERACTIONS_SERVICE_PORT}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASS=${RABBITMQ_PASS}
      - MONGO_HOST=mongo-interactions
      - AUTH_PUBLIC_KEY_URL=http://users:${USERS_SERVICE_PORT}/public-keys
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${INTERACTIONS_SERVICE_PORT}/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  mongo-interactions:
    image: mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    networks:
      - interactions-network
    environment:
      - MONGO_HOST=mongo-interactions
    healthcheck:
      test: ["CMD-SHELL", "bash /scripts/init-mongo-replica-set.sh"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 40s

networks:
  eventonight-network:
  interactions-network:
